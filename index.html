<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AOISEIKOU</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">

<style>

/* Biondi Sans (title only) */

@font-face{
  font-family:'BiondiSans';
  src:url('fonts/BiondiSans-Regular.otf') format('opentype');
}

/* base */

body{
  margin:0;
  background:radial-gradient(circle,#0a0a0a 0%,#000 70%);
  color:white;
  font-family:'Space Mono',monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  text-align:center;
  overflow:hidden;
}

/* title */

h1{
  font-family:'BiondiSans',sans-serif;
  font-size:52px;
  letter-spacing:12px;
  margin:0;
}

/* tagline */

.tagline{
  margin-top:10px;
  opacity:.8;
  letter-spacing:3px;
}

/* enter */

.enter{
  margin-top:40px;
  cursor:pointer;
  letter-spacing:3px;
  font-size:18px;
}

.enter:hover{
  opacity:.6;
}

/* corner text */

.corner{
  position:absolute;
  top:20px;
  left:20px;
  font-size:12px;
  opacity:.6;
  letter-spacing:2px;
}

/* footer */

.footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  opacity:.6;
  letter-spacing:2px;
}

/* film grain */

.grain{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('grain.png');
  opacity:.08;
  pointer-events:none;
}

/* vignette */

.vignette{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  box-shadow:inset 0 0 200px black;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="grain"></div>
<div class="vignette"></div>

<div class="corner">home / internet</div>

<h1 id="title"></h1>

<div class="tagline" id="tagline"></div>

<div class="enter" id="enter" onclick="enterSite()"></div>

<div class="footer">copyright 2026 AOISEIKOU</div>

<script>

/* typing */

let title="AOISEIKOU"
let tag="#DocumentingCulture"

let i=0
let j=0

function typeTitle(){
  if(i<title.length){
    document.getElementById("title").innerHTML+=title[i]
    i++
    setTimeout(typeTitle,120)
  }else{
    setTimeout(typeTag,300)
  }
}

function typeTag(){
  if(j<tag.length){
    document.getElementById("tagline").innerHTML+=tag[j]
    j++
    setTimeout(typeTag,80)
  }else{
    enterLoop()
  }
}

/* enter dots */

function enterLoop(){

  let dots=0

  setInterval(function(){

    dots=(dots%3)+1
    document.getElementById("enter").innerHTML="ENTER"+".".repeat(dots)

  },1000)

}

/* enter click */

function enterSite(){
  document.body.style.opacity=0
  setTimeout(function(){
    window.location.href="home.html"
  },1200)
}

typeTitle()

</script>

</body>
</html>
