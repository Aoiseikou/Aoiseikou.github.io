<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Machines of Aoiseikou</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background: radial-gradient(circle,#0a0a0a 0%,#000 70%);
  font-family:'Space Mono', monospace;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* Grain & vignette */
.grain { position: fixed; top:0; left:0; width:100%; height:100%; background:url('grain.png'); opacity:0.08; pointer-events:none;}
.vignette { position: fixed; top:0; left:0; width:100%; height:100%; box-shadow: inset 0 0 200px black; pointer-events:none;}

/* Window */
.window {
  width:600px;
  background:#111;
  border:2px solid #555;
  box-shadow:0 0 20px rgba(0,0,0,.8);
  display:flex;
  flex-direction:column;
}

/* Titlebar */
.titlebar {
  background:#222;
  padding:6px 10px;
  font-size:12px;
  letter-spacing:2px;
  display:flex;
  justify-content:space-between;
}
.titlebar .title { color:white; }
.titlebar .close { color:white; cursor:pointer; font-weight:bold; }

/* Window content */
.window-body {
  padding:20px;
}

/* Machine list */
.machine {
  padding:8px 0;
  border-bottom:1px solid #333;
  cursor:pointer;
}
.machine:hover {
  opacity:0.7;
}
.machine-name { font-size:15px; letter-spacing:1px; }
.machine-desc { font-size:12px; color:#888; }
</style>
</head>

<body>
<div class="grain"></div>
<div class="vignette"></div>

<div class="window">
  <div class="titlebar">
    <div class="title">Machines of Aoiseikou</div>
    <div class="close" onclick="location.href='home.html'">✖</div>
  </div>

  <div class="window-body">

    <div class="machine" ondblclick="location.href='r34-ztune.html'">
      <div class="machine-name">Nex's Z-tune</div>
      <div class="machine-desc">As if Z-tune wasn't powerful enough, we got 32PSI boost.</div>
    </div>

    <div class="machine" ondblclick="location.href='190e-evo2.html'">
      <div class="machine-name">Nex's 190E Evo II</div>
      <div class="machine-desc">Hybrid heart. The silver star just went supernova.</div>
    </div>

    <div class="machine" ondblclick="location.href='i8.html'">
      <div class="machine-name">BMW i8</div>
      <div class="machine-desc">LMP1 inside.</div>
    </div>

    <div class="machine" ondblclick="location.href='viper-nexspec.html'">
      <div class="machine-name">Dodge Viper NexSpec</div>
      <div class="machine-desc">Widowmaker 2.0: Now with double the bite.</div>
    </div>

  </div>
</div>
</body>
</html>
