<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AOISEIKOU</title>

<!-- Space Mono for body text -->
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">

<style>

/* Biondi Sans for title */

@font-face {
font-family: 'BiondiSans';
src: url('fonts/BiondiSans-Regular.otf') format('opentype');
font-weight: normal;
font-style: normal;
}

body{
margin:0;
background:black;
color:white;
font-family:'Space Mono', monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
flex-direction:column;
overflow:hidden;
}

/* corner text */

.corner{
position:absolute;
top:20px;
left:20px;
font-size:12px;
opacity:0.6;
letter-spacing:2px;
}

/* title */

h1{
font-family:'BiondiSans', sans-serif;
font-size:52px;
letter-spacing:12px;
margin:0;
}

/* tagline */

.tagline{
margin-top:12px;
opacity:0.8;
letter-spacing:3px;
}

/* enter button */

.enter{
margin-top:40px;
cursor:pointer;
letter-spacing:3px;
font-size:18px;
}

.enter:hover{
opacity:0.6;
}

/* footer */

.footer{
position:absolute;
bottom:20px;
font-size:12px;
opacity:0.6;
letter-spacing:2px;
}

</style>
</head>

<body>

<div class="corner">
home / internet
</div>

<h1 id="title"></h1>

<div class="tagline" id="tagline"></div>

<div class="enter" id="enter" onclick="enterSite()"></div>

<div class="footer">
copyright 2026 AOISEIKOU
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* typing animation */

let titleText = "AOISEIKOU";
let tagText = "#DocumentingCulture";

let i = 0;
let j = 0;

function typeTitle(){

if(i < titleText.length){

document.getElementById("title").innerHTML += titleText.charAt(i);

i++;

setTimeout(typeTitle,120);

}else{

setTimeout(typeTag,300);

}

}

function typeTag(){

if(j < tagText.length){

document.getElementById("tagline").innerHTML += tagText.charAt(j);

j++;

setTimeout(typeTag,80);

}else{

startEnter();

}

}

/* ENTER dots animation */

function startEnter(){

let dots = 0;

setInterval(function(){

dots = (dots % 3) + 1;

let dotText = ".".repeat(dots);

document.getElementById("enter").innerHTML = "ENTER" + dotText;

},1000);

}

/* ENTER click */

function enterSite(){

let music = document.getElementById("music");

music.volume = 0;

music.play();

let fade = setInterval(function(){

if(music.volume < 0.6){

music.volume += 0.02;

}else{

clearInterval(fade);

}

},100);

document.body.style.opacity = 0;

setTimeout(function(){

window.location.href = "home.html";

},1200);

}

typeTitle();

</script>

</body>
</html>
